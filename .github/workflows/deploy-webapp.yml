name: Deploy Webapp

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webapp

      # ── BUILD #1: для GitHub Pages (base=/VpnBot/) ────────────────────
      - name: Build for GitHub Pages
        run: npm run build
        working-directory: webapp
        env:
          VITE_BASE_PATH: /VpnBot/
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

      - uses: actions/deploy-pages@v4
        id: deployment

      # ── BUILD #2: для production maxvpnesim.com (base=/) ──────────────
      # nginx обслуживает корень домена, поэтому абсолютные пути типа
      # /assets/... должны не иметь префикса /VpnBot/.
      - name: Build for production server
        run: |
          rm -rf webapp/dist
          npm run build
        working-directory: webapp
        env:
          VITE_BASE_PATH: /
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to production server (rsync)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=yes" \
            webapp/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
