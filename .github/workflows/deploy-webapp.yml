name: Deploy Webapp

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webapp

      # ── BUILD #1: для GitHub Pages (base=/VpnBot/) ────────────────────
      - name: Build for GitHub Pages
        run: npm run build
        working-directory: webapp
        env:
          VITE_BASE_PATH: /VpnBot/
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SHOW_ESIM: "false"

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

      - uses: actions/deploy-pages@v4
        id: deployment

      # ── BUILD #2: для production maxvpnesim.com (base=/) ──────────────
      # nginx обслуживает корень домена, поэтому абсолютные пути типа
      # /assets/... должны не иметь префикса /VpnBot/.
      # VITE_API_URL намеренно пустой — fetch идёт на относительный /api/...
      # через тот же nginx (иначе mixed-content: https://maxvpnesim.com →
      # http://151.243.113.31 блокируется браузером).
      - name: Build for production server
        run: |
          rm -rf webapp/dist
          npm run build
        working-directory: webapp
        env:
          VITE_BASE_PATH: /
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_API_URL: ""
          VITE_SHOW_ESIM: "false"

      - name: Deploy to production server (rsync)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # --omit-dir-times: пропускаем mtime у директорий — иначе rsync пытается
          #   set times на dir и падает с EPERM если её владелец — другой юзер
          # --chmod: новые файлы/dirs группа-writable, чтобы другие (root, ручной
          #   rsync) тоже могли перезаписать без конфликтов ownership
          rsync -avz --delete --omit-dir-times \
            --chmod=Du=rwx,Dg=rwxs,Do=rx,Fu=rw,Fg=rw,Fo=r \
            -e "ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=yes" \
            webapp/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
